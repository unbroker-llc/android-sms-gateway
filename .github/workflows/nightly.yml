name: Nightly APK

# Builds a signed release APK from the MMS-support branch on every push, and publishes an
# incrementing prerelease so Obtainium on the gateway device auto-updates. Reuses upstream's
# build-apk.yml; signed with the Unbroker nightly keystore (repo secrets).
on:
  push:
    branches: [mms/extended-support]
  workflow_dispatch: {}

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  build:
    name: Build signed release APK
    uses: ./.github/workflows/build-apk.yml
    with:
      version-name: nightly-${{ github.run_number }}
      build-type: release
    secrets:
      google-services-json: ${{ secrets.GOOGLE_SERVICES_JSON }}
      signing-key-store-base64: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
      signing-key-alias: ${{ secrets.SIGNING_KEY_ALIAS }}
      signing-key-password: ${{ secrets.SIGNING_KEY_PASSWORD }}
      signing-store-password: ${{ secrets.SIGNING_STORE_PASSWORD }}

  release:
    name: Publish nightly release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: artifacts
      - name: Show artifacts
        run: find artifacts -type f
      - name: Publish nightly prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.run_number }}
          name: Nightly build ${{ github.run_number }}
          body: |
            Automated nightly build of the MMS-support branch (mms/extended-support) for the
            Unbroker cold-SMS gateway. Signed with the Unbroker nightly keystore. Tracked by
            Obtainium on the gateway Pixel.
          prerelease: true
          files: artifacts/**/app-release.apk

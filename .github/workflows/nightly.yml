name: Nightly APK

# Self-contained signed nightly build of the MMS-support branch for the Unbroker cold-SMS gateway.
# Publishes an incrementing prerelease so Obtainium on the gateway Pixel auto-updates. Signed with
# the Unbroker nightly keystore (repo secrets); versionCode is kept above the upstream release line
# so our build registers as newer.
on:
  push:
    branches: [mms/extended-support]
  workflow_dispatch: {}

concurrency:
  group: nightly
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build + publish signed release APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Placeholder google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > ./app/google-services.json

      - name: Set version (monotonic, above upstream line)
        run: |
          CODE=$(( 1500 + ${{ github.run_number }} ))
          sed -i "s/versionName.*/versionName \"nightly-${{ github.run_number }}\"/" app/build.gradle
          sed -i "s/versionCode.*/versionCode ${CODE}/" app/build.gradle
          grep -nE "versionName|versionCode" app/build.gradle | head

      - name: Decode signing keystore
        run: echo "${{ secrets.SIGNING_KEY_STORE_BASE64 }}" | base64 --decode > app/keystore.jks

      - name: Build release APK
        env:
          SIGNING_KEY_STORE_PATH: app/keystore.jks
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        run: ./gradlew assembleRelease -x lintVitalRelease --no-daemon --stacktrace

      - name: Locate APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk -name '*release*.apk' | head -1)
          echo "Found APK: $APK"
          echo "path=$APK" >> "$GITHUB_OUTPUT"

      - name: Publish nightly prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.run_number }}
          name: Nightly build ${{ github.run_number }}
          prerelease: true
          files: ${{ steps.apk.outputs.path }}
